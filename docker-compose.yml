version: "3.8"

services:
  memory-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
